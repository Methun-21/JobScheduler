<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#0e152d"/>
    </linearGradient>
    
    <!-- Box Gradients -->
    <linearGradient id="blueBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0080ff" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="purpleBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a2be2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4b0082" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="greenBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00aa50" stop-opacity="0.05"/>
    </linearGradient>
    
    <!-- Border Filters (glow) -->
    <filter id="glowCyan" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00f0ff" flood-opacity="0.4"/>
    </filter>
    <filter id="glowPurple" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#8a2be2" flood-opacity="0.4"/>
    </filter>
    <filter id="glowGreen" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00ff88" flood-opacity="0.4"/>
    </filter>
    
    <!-- Marker for Arrowheads -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00ff88"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" rx="15" fill="url(#bgGrad)"/>
  <rect width="898" height="598" x="1" y="1" rx="14" fill="none" stroke="#253565" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="45" font-family="sans-serif" font-size="24" font-weight="bold" fill="#f0f4f8" text-anchor="middle" letter-spacing="1">
    DISTRIBUTED SCHEDULER ARCHITECTURE
  </text>
  <text x="450" y="68" font-family="sans-serif" font-size="12" fill="#9aa8bd" text-anchor="middle">
    High-Availability Concurrency Model &amp; Lock-Driven Execution
  </text>

  <!-- User / Dashboard Layer -->
  <g transform="translate(50, 220)">
    <rect width="180" height="120" rx="10" fill="url(#blueBox)" stroke="#00f0ff" stroke-width="1.5" filter="url(#glowCyan)"/>
    <text x="90" y="35" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00f0ff" text-anchor="middle">Dashboard App</text>
    <text x="90" y="60" font-family="sans-serif" font-size="12" fill="#f0f4f8" text-anchor="middle">React (Vite)</text>
    <text x="90" y="85" font-family="sans-serif" font-size="11" fill="#9aa8bd" text-anchor="middle">Real-time Graphs</text>
    <text x="90" y="100" font-family="sans-serif" font-size="11" fill="#9aa8bd" text-anchor="middle">Queue Configurations</text>
  </g>

  <!-- API / Control Plane Layer -->
  <g transform="translate(350, 160)">
    <rect width="200" height="240" rx="10" fill="url(#purpleBox)" stroke="#8a2be2" stroke-width="1.5" filter="url(#glowPurple)"/>
    <text x="100" y="35" font-family="sans-serif" font-size="18" font-weight="bold" fill="#c084fc" text-anchor="middle">API Service</text>
    <text x="100" y="58" font-family="sans-serif" font-size="12" fill="#f0f4f8" text-anchor="middle">FastAPI (Python)</text>
    <line x1="20" y1="75" x2="180" y2="75" stroke="#4b2e83" stroke-width="1"/>
    
    <!-- Subcomponents -->
    <rect x="20" y="90" width="160" height="35" rx="5" fill="#151b35" stroke="#8a2be2" stroke-width="1"/>
    <text x="100" y="112" font-family="sans-serif" font-size="11" fill="#f0f4f8" text-anchor="middle">Auth &amp; RBAC Control</text>

    <rect x="20" y="135" width="160" height="35" rx="5" fill="#151b35" stroke="#8a2be2" stroke-width="1"/>
    <text x="100" y="157" font-family="sans-serif" font-size="11" fill="#f0f4f8" text-anchor="middle">Job Submission Engine</text>

    <rect x="20" y="180" width="160" height="40" rx="5" fill="#151b35" stroke="#8a2be2" stroke-width="1"/>
    <text x="100" y="197" font-family="sans-serif" font-size="11" font-weight="bold" fill="#00f0ff" text-anchor="middle">Scheduler Loop</text>
    <text x="100" y="212" font-family="sans-serif" font-size="9" fill="#9aa8bd" text-anchor="middle">(Session Lock Leader)</text>
  </g>

  <!-- Database Layer -->
  <g transform="translate(360, 460)">
    <rect width="180" height="90" rx="10" fill="url(#blueBox)" stroke="#00f0ff" stroke-width="1.5" filter="url(#glowCyan)"/>
    <ellipse cx="90" cy="20" rx="70" ry="12" fill="#101830" stroke="#00f0ff" stroke-width="1"/>
    <text x="90" y="52" font-family="sans-serif" font-size="16" font-weight="bold" fill="#f0f4f8" text-anchor="middle">PostgreSQL</text>
    <text x="90" y="72" font-family="sans-serif" font-size="11" fill="#00f0ff" text-anchor="middle">Single Source of Truth</text>
  </g>

  <!-- Worker Layer -->
  <g transform="translate(680, 200)">
    <rect width="170" height="160" rx="10" fill="url(#greenBox)" stroke="#00ff88" stroke-width="1.5" filter="url(#glowGreen)"/>
    <text x="85" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00ff88" text-anchor="middle">Worker Nodes</text>
    <text x="85" y="50" font-family="sans-serif" font-size="11" fill="#9aa8bd" text-anchor="middle">Horizontal Daemons</text>
    
    <rect x="15" y="70" width="140" height="30" rx="4" fill="#0b1a18" stroke="#00ff88" stroke-width="1"/>
    <text x="85" y="88" font-family="sans-serif" font-size="11" fill="#f0f4f8" text-anchor="middle">Queue Advisory Lock</text>

    <rect x="15" y="110" width="140" height="30" rx="4" fill="#0b1a18" stroke="#00ff88" stroke-width="1"/>
    <text x="85" y="128" font-family="sans-serif" font-size="11" fill="#f0f4f8" text-anchor="middle">SKIP LOCKED Claims</text>
  </g>

  <!-- Connection Lines & Annotations -->
  <!-- Dashboard <--> API -->
  <path d="M 230 260 L 350 260" fill="none" stroke="#00f0ff" stroke-width="1.5" marker-end="url(#arrowCyan)" marker-start="url(#arrowCyan)"/>
  <text x="290" y="245" font-family="sans-serif" font-size="10" fill="#00f0ff" text-anchor="middle">REST / JSON</text>
  <text x="290" y="280" font-family="sans-serif" font-size="10" fill="#00f0ff" text-anchor="middle">WebSockets</text>

  <!-- API <--> DB -->
  <path d="M 450 400 L 450 460" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="495" y="435" font-family="sans-serif" font-size="10" fill="#9aa8bd" text-anchor="middle">SQLAlchemy</text>

  <!-- Worker <--> DB -->
  <path d="M 720 360 L 540 480" fill="none" stroke="#00ff88" stroke-width="1.5" marker-end="url(#arrowGreen)" marker-start="url(#arrowGreen)"/>
  <text x="655" y="445" font-family="sans-serif" font-size="10" fill="#00ff88" text-anchor="middle" transform="rotate(-30 655 445)">Polled Claim Query</text>

  <!-- Pinned Leader Lock Link -->
  <path d="M 370 230 C 310 260, 310 460, 360 480" fill="none" stroke="#c084fc" stroke-dasharray="3,3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="380" font-family="sans-serif" font-size="10" fill="#c084fc" text-anchor="middle">Pinned Leader Lock</text>

  <!-- Heartbeat Link -->
  <path d="M 680 250 L 550 250" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="615" y="240" font-family="sans-serif" font-size="10" fill="#9aa8bd" text-anchor="middle">Heartbeat</text>

</svg>
