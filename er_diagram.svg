<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#0e152d"/>
    </linearGradient>
    
    <!-- Table Header Gradients -->
    <linearGradient id="headerBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#00c0ff"/>
    </linearGradient>
    
    <linearGradient id="headerPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a2be2"/>
      <stop offset="100%" stop-color="#b060ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" rx="15" fill="url(#bgGrad)"/>
  <rect width="1098" height="798" x="1" y="1" rx="14" fill="none" stroke="#253565" stroke-width="1.5"/>

  <!-- Title -->
  <text x="550" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#f0f4f8" text-anchor="middle" letter-spacing="1">
    RELATIONAL DATABASE SCHEMA (ERD)
  </text>
  <text x="550" y="60" font-family="sans-serif" font-size="12" fill="#9aa8bd" text-anchor="middle">
    Multi-Tenant Jobs Queue Schema Design
  </text>

  <!-- 1. users table -->
  <g transform="translate(40, 100)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="180" height="110" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 180 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="90" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">users</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">UK | email: varchar</text>
    <text x="10" y="85">     password_hash</text>
    <text x="10" y="105">     created_at / updated</text>
  </g>

  <!-- 2. organizations table -->
  <g transform="translate(40, 270)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="180" height="75" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 180 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="90" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">organizations</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">     name / created_at</text>
  </g>

  <!-- 3. org_members table -->
  <g transform="translate(40, 400)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="180" height="95" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 180 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="90" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">org_members</text>
    
    <text x="10" y="45" font-weight="bold">PK,FK| org_id: uuid</text>
    <text x="10" y="65" font-weight="bold">PK,FK| user_id: uuid</text>
    <text x="10" y="85">       role: varchar</text>
  </g>

  <!-- 4. projects table -->
  <g transform="translate(290, 150)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="180" height="115" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 180 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="90" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">projects</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">FK | org_id: uuid</text>
    <text x="10" y="85">     name: varchar</text>
    <text x="10" y="105">FK | created_by: uuid</text>
  </g>

  <!-- 5. queues table -->
  <g transform="translate(540, 130)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="210" height="155" rx="6" fill="#0d1428" stroke="#8a2be2" stroke-width="1"/>
    <path d="M 0 25 L 210 25" stroke="#8a2be2" stroke-width="1"/>
    <text x="105" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b060ff" text-anchor="middle">queues</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">FK | project_id: uuid</text>
    <text x="10" y="85">     name: varchar</text>
    <text x="10" y="105">     priority: integer</text>
    <text x="10" y="125">     max_concurrency</text>
    <text x="10" y="145">FK | default_retry_policy_id</text>
  </g>

  <!-- 6. retry_policies table -->
  <g transform="translate(290, 310)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="180" height="135" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 180 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="90" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">retry_policies</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">     name: varchar</text>
    <text x="10" y="85">     strategy: varchar</text>
    <text x="10" y="105">     base_delay_sec</text>
    <text x="10" y="125">     max_retries</text>
  </g>

  <!-- 7. job_batches table -->
  <g transform="translate(545, 330)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="200" height="135" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 200 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="100" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">job_batches</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">FK | project_id: uuid</text>
    <text x="10" y="85">     name: varchar</text>
    <text x="10" y="105">     completed_jobs: int</text>
    <text x="10" y="125">     failed_jobs: int</text>
  </g>

  <!-- 8. job_templates table -->
  <g transform="translate(820, 100)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="240" height="135" rx="6" fill="#0d1428" stroke="#8a2be2" stroke-width="1"/>
    <path d="M 0 25 L 240 25" stroke="#8a2be2" stroke-width="1"/>
    <text x="120" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b060ff" text-anchor="middle">job_templates</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">FK | queue_id: uuid</text>
    <text x="10" y="85">     cron_expression: varchar</text>
    <text x="10" y="105">     type / payload: jsonb</text>
    <text x="10" y="125">     next_run_at: timestamptz</text>
  </g>

  <!-- 9. jobs table -->
  <g transform="translate(820, 275)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="240" height="195" rx="6" fill="#0d1428" stroke="#8a2be2" stroke-width="1"/>
    <path d="M 0 25 L 240 25" stroke="#8a2be2" stroke-width="1"/>
    <text x="120" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b060ff" text-anchor="middle">jobs</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">FK | queue_id: uuid</text>
    <text x="10" y="85">FK | batch_id: uuid (Null)</text>
    <text x="10" y="105">FK | parent_template_id (Null)</text>
    <text x="10" y="125">     status / type / payload</text>
    <text x="10" y="145">     attempt_count / max</text>
    <text x="10" y="165">     idempotency_key (Null)</text>
    <text x="10" y="185">FK | retry_policy_id (Null)</text>
  </g>

  <!-- 10. job_dependencies table -->
  <g transform="translate(820, 510)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="240" height="75" rx="6" fill="#0d1428" stroke="#8a2be2" stroke-width="1"/>
    <path d="M 0 25 L 240 25" stroke="#8a2be2" stroke-width="1"/>
    <text x="120" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#b060ff" text-anchor="middle">job_dependencies</text>
    
    <text x="10" y="45" font-weight="bold">PK,FK| job_id: uuid</text>
    <text x="10" y="65" font-weight="bold">PK,FK| depends_on_job_id: uuid</text>
  </g>

  <!-- 11. job_executions table -->
  <g transform="translate(545, 510)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="200" height="135" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 200 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="100" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">job_executions</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">FK | job_id: uuid</text>
    <text x="10" y="85">FK | worker_id: varchar</text>
    <text x="10" y="105">     attempt_number: int</text>
    <text x="10" y="125">     status / result / error</text>
  </g>

  <!-- 12. job_logs table -->
  <g transform="translate(290, 520)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="180" height="95" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 180 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="90" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">job_logs</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: uuid</text>
    <text x="10" y="65">FK | execution_id: uuid</text>
    <text x="10" y="85">     level / message</text>
  </g>

  <!-- 13. workers table -->
  <g transform="translate(545, 680)" font-family="monospace" font-size="11" fill="#f0f4f8">
    <rect width="200" height="95" rx="6" fill="#0d1428" stroke="#00c0ff" stroke-width="1"/>
    <path d="M 0 25 L 200 25" stroke="#00c0ff" stroke-width="1"/>
    <text x="100" y="17" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00c0ff" text-anchor="middle">workers</text>
    
    <text x="10" y="45" font-weight="bold">PK | id: varchar</text>
    <text x="10" y="65">     hostname / status</text>
    <text x="10" y="85">     last_heartbeat_at</text>
  </g>

  <!-- Connective Links (Lines representing FK relations) -->
  <!-- user -> org_member -->
  <path d="M 130 210 L 130 400" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- org -> org_member -->
  <path d="M 130 345 L 130 400" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- org -> project -->
  <path d="M 220 307 L 290 200" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- project -> queue -->
  <path d="M 470 200 L 540 200" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- project -> batches -->
  <path d="M 470 230 L 545 350" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- queue -> templates -->
  <path d="M 750 160 L 820 160" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- queue -> jobs -->
  <path d="M 750 210 L 820 330" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- job -> execution -->
  <path d="M 820 380 L 745 540" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- execution -> logs -->
  <path d="M 545 570 L 470 570" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- workers -> execution -->
  <path d="M 645 680 L 645 645" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
  <!-- job -> dependencies -->
  <path d="M 940 470 L 940 510" fill="none" stroke="#64748b" stroke-dasharray="3,3"/>
</svg>
