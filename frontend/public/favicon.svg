<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#8a2be2" />
    </linearGradient>
  </defs>
  <!-- Outer ring representing orbit/schedule -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#gradient)" stroke-width="2.5" stroke-dasharray="6 3" />
  <!-- Inner core representing Antigravity scheduler engine -->
  <circle cx="16" cy="16" r="6" fill="url(#gradient)" />
  <!-- Minimal clock hands -->
  <line x1="16" y1="16" x2="16" y2="12" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="16" y1="16" x2="19" y2="16" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
</svg>